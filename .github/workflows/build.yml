name: Build and Release ESP32 Firmware

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and upload assets to (e.g. v1.0.37.1-OC)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - board: NERDQAXEPLUS2
            upload_www: true
            label: NerdQAxe++

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Get Version Tag
      id: version_tag
      run: |
        git fetch --tags
        echo "VERSION_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
        echo "${{ github.event.inputs.tag }}" > version.txt

    - name: Verify release exists
      run: |
        if ! gh release view "${{ env.VERSION_TAG }}" >/dev/null 2>&1; then
          echo "ERROR: No GitHub release found for tag '${{ env.VERSION_TAG }}'. Please create the release before running this workflow."
          exit 1
        fi
        echo "Release '${{ env.VERSION_TAG }}' found — proceeding with build."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Insert Version
      run: |
        #!/bin/bash
        set -e
        COMMIT_HASH=$(git rev-parse --short HEAD)
        sed -e "s|__COMMIT__|${COMMIT_HASH}|g" -i ./main/http_server/axe-os/src/app/app.module.ts
        sed -e "s|__VERSION__|${VERSION_TAG}|g" -i ./main/http_server/axe-os/src/app/app.module.ts
        for l in de en es fr; do
          mv "./main/http_server/axe-os/src/assets/i18n/${l}.json" "./main/http_server/axe-os/src/assets/i18n/${l}.${COMMIT_HASH}.json"
        done

    - name: Set Target
      run: |
        docker run --rm --user root -e BOARD=${{ matrix.board }} -v $PWD:/home/builder/project \
        shufps/esp-idf-builder:0.0.1 idf.py set-target esp32s3

    - name: Compile Binaries
      run: |
        docker run --rm --user root -e BOARD=${{ matrix.board }} -v $PWD:/home/builder/project \
        shufps/esp-idf-builder:0.0.1 idf.py build

    - name: Merge Binaries
      run: |
        docker run --rm --user root -v $PWD:/home/builder/project \
        shufps/esp-idf-builder:0.0.1 esptool.py --chip esp32s3 merge_bin --flash_mode dio --flash_size 16MB --flash_freq 80m \
        0x0 build/bootloader/bootloader.bin \
        0x8000 build/partition_table/partition-table.bin \
        0x10000 build/esp-miner.bin \
        0x410000 build/www.bin \
        0xf10000 build/ota_data_initial.bin \
        -o esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.bin

    - name: Generate SHA-256 Sum of factory file
      run: |
        sha256sum esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.bin > esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.sha256

    - name: Upload SHA-256 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.sha256
        path: esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.sha256

    - name: Rename Build Artifacts
      run: |
        sudo mv build/esp-miner.bin build/esp-miner-${{ matrix.label }}.bin
        sudo mv build/esp-miner.elf build/esp-miner-${{ matrix.label }}.elf

    - name: Create files list
      run: |
        echo "esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.bin" > file_list.txt
        echo "build/esp-miner-${{ matrix.label }}.bin" >> file_list.txt
        echo "build/esp-miner-${{ matrix.label }}.elf" >> file_list.txt
        if [ "${{ matrix.upload_www }}" == "true" ]; then
          echo "build/www.bin" >> file_list.txt
        fi

    - name: Set files variable
      id: set_files_var
      run: echo "files=$(cat file_list.txt | tr '\n' ',')" >> $GITHUB_ENV

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.files }}
        tag_name: ${{ env.VERSION_TAG }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Download existing releases.json from R2
      run: |
        HTTP_STATUS=$(curl -s -o releases.json -w "%{http_code}" "https://pub-f8ed8218b3b94a659b581f81c298b179.r2.dev/releases.json")
        if [ "$HTTP_STATUS" != "200" ] || ! jq empty releases.json 2>/dev/null; then
          echo "No valid releases.json found, starting fresh."
          echo '{"updated_at":"","releases":[]}' > releases.json
        fi

    - name: Update releases.json
      run: |
        BINARY_NAME="esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.bin"
        DOWNLOAD_URL="https://github.com/C4Wiz/ESP-Miner-NerdQAxePlus/releases/download/${{ env.VERSION_TAG }}/${BINARY_NAME}"
        SHA256=$(awk '{print $1}' esp-miner-factory-${{ matrix.label }}-${{ env.VERSION_TAG }}.sha256)
        NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        IS_PRERELEASE=$(curl -s "https://api.github.com/repos/C4Wiz/ESP-Miner-NerdQAxePlus/releases/tags/${{ env.VERSION_TAG }}" | jq '.prerelease')

        echo "BINARY_NAME: ${BINARY_NAME}"
        echo "SHA256: ${SHA256}"
        echo "IS_PRERELEASE: ${IS_PRERELEASE}"
        echo "Current releases.json:"
        cat releases.json

        jq --arg version "${{ env.VERSION_TAG }}" \
           --arg name "${{ env.VERSION_TAG }}" \
           --arg asset_name "${BINARY_NAME}" \
           --arg url "${DOWNLOAD_URL}" \
           --arg sha256 "${SHA256}" \
           --arg now "${NOW}" \
           --argjson prerelease "${IS_PRERELEASE}" \
           '.updated_at = $now |
            .releases = [{"version": $version, "name": $name, "sha256": $sha256, "prerelease": $prerelease, "assets": [{"name": $asset_name, "browser_download_url": $url}]}] + 
            (.releases | map(select(.version != $version)))' \
           releases.json > releases_updated.json && mv releases_updated.json releases.json

        echo "Updated releases.json:"
        cat releases.json
